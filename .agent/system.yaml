# System Configuration
project:
  name: Nishaniyaan
  description: Signs of the Day of Judgment - Presentation Website
  type: static-website
  language: en
  domain: islamic-reference

repository:
  url: https://github.com/amirhashmilive/nishaniyaan
  live: https://amirhashmilive.github.io/nishaniyaan/
  branch: main

tech_stack:
  frontend:
    - HTML5
    - CSS3 (Custom with variables)
    - Vanilla JavaScript
  libraries:
    - Chart.js
    - Font Awesome
    - Google Fonts (Inter, Outfit, Amiri)
  hosting:
    - GitHub Pages
    - Cloudflare (custom domain)

architecture:
  type: multi-page-presentation
  slides: 100vh full-viewport
  navigation: floating controls
  theme: dark/light toggle

chapters:
  total: 8
  structure:
    - 01: Introduction (6 slides)
    - 02: Phase 1: Before Dajjal (9 slides)
    - 03: Phase 2: Just Before Dajjal (8 slides)
    - 04: Phase 3: Imam Mahdi (5 slides)
    - 05: Phase 4: The 439 Days of Dajjal (10 slides)
    - 06: Phase 5: Isa AS Descent (6 slides)
    - 07: Phase 6: After Dajjal (5 slides)
    - 08: Phase 7: To Qiyamah + Bibliography (6 slides)

verification_badges:
  - 🟢 Authentic (Qur'an)
  - 🟢 Sahih Hadith
  - 🟡 Hasan
  - 🟠 Da'if (Weak)
  - 🔴 Mawdu' (Fabricated)
  - ⚪ Scholarly Opinion
  - 🔵 Historical Record
  - 🟣 Observation
  - ⚫ Unverified
