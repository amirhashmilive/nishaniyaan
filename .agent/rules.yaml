# Coding and Design Rules

general:
  - Keep it simple
  - No heavy frameworks or build steps required
  - Vanilla JS only
  - CSS variables for design system and theming

ui_rules:
  - Every slide is 100vh with scroll-snap
  - Use glassmorphism for cards (`glass-card`)
  - 1.5x hover magnification (`hover-magnify`)
  - Dark/light theme must persist across pages
  - No traditional website top menu bars or footers

content_rules:
  - All content in English
  - Every content item must have verification badge
  - Qur'an: 🟢 Authentic
  - Hadith: 🟢 Sahih / 🟡 Hasan / 🟠 Da'if / 🔴 Mawdu'
  - Opinions: ⚪ Scholarly Opinion
  - Historical: 🔵 Historical Record
  - Observations: 🟣 Observation
  - Unverified: ⚫ Unverified

language_rules:
  - ALL content must be in English
  - Any input in any language MUST be translated to English
  - Translation must preserve meaning, context, and nuance
  - Arabic terms may be kept with transliteration
  - NO non-English content on the website

content_processing:
  sanitization:
    - Remove all podcast/channel/host identities
    - Remove timestamps and production metadata
    - Remove personal identifiers
    - Keep substantive content only

  verification:
    - Verify against Qur'an and Hadith sources
    - DO NOT mention Shia/Sunni divisions
    - Assign appropriate verification badge
    - Always cite the source if found

  distribution:
    - Distribute to correct chapter/slide
    - NEVER discard content - quarantine unverified claims
    - Update existing slides or create new ones

  language:
    - Translate any non-English input to English
    - Verify translation accuracy
    - Insert only English content into the website

naming:
  - Files: kebab-case (chapter-01.html)
  - Classes: kebab-case (glass-card)
  - IDs: camelCase (slideNumber)

git:
  - Commit messages: "type: description"
  - Types: feat, fix, refactor, docs, test, chore
  - Push after each completed task
